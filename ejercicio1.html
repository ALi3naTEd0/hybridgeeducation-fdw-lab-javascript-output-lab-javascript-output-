<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ejercicio 1</title>
</head>
<body>
	<p id="mensaje"></p>
	<button type="button" onclick="actualizarTexto()">Actualizar texto</button>

	<script>
		function actualizarTexto() {
			document.getElementById("mensaje").textContent = "¡Texto actualizado con Javascript!";
		}
	</script>
</body>
</html>
