<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ejercicio 2</title>
</head>
<body>
	<h1>Demostración de Output en Javascript</h1>

	<button type="button" onclick="mostrarNombre()">Mostrar nombre</button>

	<p id="texto"></p>
	<button type="button" onclick="actualizarParrafo()">Actualizar párrafo</button>

	<script>
		console.log("La página se ha cargado correctamente.");

		function mostrarNombre() {
			alert("Tu Nombre");
		}

		function actualizarParrafo() {
			document.getElementById("texto").textContent = "¡Texto actualizado con Javascript!";
		}
	</script>
</body>
</html>
